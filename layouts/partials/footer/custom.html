<!-- Back to Top Button -->
<button id="back-to-top" class="back-to-top" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
</button>

<script>
(function(){
    var btn = document.getElementById('back-to-top');
    var ticking = false;
    window.addEventListener('scroll', function(){
        if(!ticking){
            requestAnimationFrame(function(){
                btn.classList.toggle('visible', window.scrollY > 300);
                ticking = false;
            });
            ticking = true;
        }
    }, {passive:true});
})();
</script>

<script>
// Mobile: hide logo on scroll, show when at top
(function(){
    var sidebar = document.querySelector('.left-sidebar');
    if (!sidebar || window.innerWidth > 767) return;
    var ticking = false;
    window.addEventListener('scroll', function(){
        if(!ticking){
            requestAnimationFrame(function(){
                sidebar.classList.toggle('scrolled', window.scrollY > 30);
                ticking = false;
            });
            ticking = true;
        }
    }, {passive:true});
})();
</script>
