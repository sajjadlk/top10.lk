baseurl: https://top10.lk/
languageCode: en-us
theme: stack
title: Top10.lk | Sri Lanka's Best Lists & Reviews
copyright: Top10.lk

DefaultContentLanguage: en
hasCJKLanguage: false

languages:
    en:
        languageName: English
        title: Top10.lk
        weight: 1
        params:
            sidebar:
                subtitle: ""

pagination:
    pagerSize: 12

permalinks:
    post: /:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon: /favicon.ico

    footer:
        since: 2026
        customText: Curated lists for exploring the best of Sri Lanka.

    dateFormat:
        published: Jan 02, 2006
        lastUpdated: Jan 02, 2006 15:04 MST

    sidebar:
        emoji: 
        subtitle: ""
        avatar:
            enabled: true
            local: true
            src: img/logo.jpg

    article:
        math: false
        toc: true
        readingTime: true
        license:
            enabled: false
            default: Licensed under CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider:

    widgets:
        homepage:
            - type: search
        page:
            - type: search
            - type: toc

    opengraph:
        twitter:
            site:
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        toggle: false
        default: dark

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

outputs:
    home: ["HTML", "RSS"]
    page: ["HTML"]
    section: ["HTML", "RSS"]

menu:
    main:
        - identifier: hotels
          name: Hotels
          url: /categories/hotels/
          weight: 10
        - identifier: food
          name: Dining
          url: /categories/dining/
          weight: 20
        - identifier: travel
          name: Travel
          url: /categories/travel/
          weight: 30
        - identifier: lifestyle
          name: Lifestyle
          url: /categories/lifestyle/
          weight: 40

    social: []

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100
        - name: categories
          weight: 200

markup:
    goldmark:
        extensions:
            passthrough:
                enable: true
                delimiters:
                    block:
                        - - \[
                          - \]
                        - - $$
                          - $$
                    inline:
                        - - \(
                          - \)
                        - - $$
                          - $$
        renderer:
            unsafe: true
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
